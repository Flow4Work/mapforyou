# Triggered after workflow registration
name: Apply Jongno region support

on:
  push:
    paths:
      - ".github/workflows/apply-jongno-region.yml"

permissions:
  contents: write

jobs:
  patch:
    if: contains(github.event.head_commit.message, 'Install one-time Jongno patch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Add Jongno across collection, images, and public discovery
        shell: python
        run: |
          from pathlib import Path

          def replace(path_str: str, old: str, new: str) -> None:
              path = Path(path_str)
              text = path.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Expected text not found in {path_str}: {old[:100]!r}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace(
              "components/PublicDataCollector.tsx",
              '''              <option value="hongdae">홍대·마포구</option>
              <option value="geondae">건대·광진구</option>
              <option value="custom">직접 입력</option>''',
              '''              <option value="hongdae">홍대·마포구</option>
              <option value="geondae">자양·건대·광진구</option>
              <option value="jongno">종로·종로구</option>
              <option value="custom">직접 입력</option>''',
          )

          replace(
              "app/api/redtable/collect/route.ts",
              '''const REGION_ALIASES: Record<string, string[]> = {
  seongsu: ["성동구", "성수동"],
  hongdae: ["마포구", "서교동", "동교동", "연남동", "상수동", "합정동"],
};''',
              '''const REGION_ALIASES: Record<string, string[]> = {
  seongsu: ["성동구", "성수동"],
  hongdae: ["마포구", "서교동", "동교동", "연남동", "상수동", "합정동"],
  geondae: ["광진구", "자양동", "화양동", "군자동"],
  jongno: ["종로구", "인사동", "익선동", "삼청동", "안국동", "가회동", "혜화동", "명륜동"],
};''',
          )

          replace(
              "lib/discovery.ts",
              'const ACTIVE_REGIONS = ["seongsu", "hongdae"];',
              'const ACTIVE_REGIONS = ["seongsu", "hongdae", "geondae", "jongno"];',
          )

          replace(
              "app/api/public-data/images/route.ts",
              'const ACTIVE_REGIONS = new Set(["seongsu", "hongdae"]);',
              'const ACTIVE_REGIONS = new Set(["seongsu", "hongdae", "geondae", "jongno"]);',
          )

          replace(
              "app/api/tourapi/images/route.ts",
              'const ACTIVE_REGIONS = ["seongsu", "hongdae"];',
              'const ACTIVE_REGIONS = ["seongsu", "hongdae", "geondae", "jongno"];',
          )

          replace(
              "app/api/tourapi/images/route.ts",
              '.replace(/\\b(성수|홍대|서울|왕십리|마포|성동)\\s*(점|본점|지점)?\\b/g, " ")',
              '.replace(/\\b(성수|홍대|서울|왕십리|마포|성동|자양|건대|광진|종로|인사동|익선동|삼청동|안국)\\s*(점|본점|지점)?\\b/g, " ")',
          )

          replace(
              "app/api/tourapi/images/route.ts",
              '''  const district = store.region_key === "hongdae" ? "마포구" : "성동구";
  if (itemAddress.includes(district)) score += 15;''',
              '''  const districtByRegion: Record<string, string> = {
    seongsu: "성동구",
    hongdae: "마포구",
    geondae: "광진구",
    jongno: "종로구",
  };
  const district = districtByRegion[store.region_key || ""] || "";
  if (district && itemAddress.includes(district)) score += 15;''',
          )

          replace(
              "lib/discovery-ui.ts",
              '''    seongsu: { en: "Seongsu", ja: "聖水" },
    hongdae: { en: "Hongdae", ja: "弘大" },
    geondae: { en: "Konkuk Univ.", ja: "建大入口" },''',
              '''    seongsu: { en: "Seongsu", ja: "聖水" },
    hongdae: { en: "Hongdae", ja: "弘大" },
    geondae: { en: "Konkuk Univ.", ja: "建大入口" },
    jongno: { en: "Jongno", ja: "鍾路" },''',
          )

          replace(
              "lib/discovery-ui.ts",
              '''      .replace("ソンドング", "城東区")
      .replace("マポグ", "麻浦区");''',
              '''      .replace("ソンドング", "城東区")
      .replace("マポグ", "麻浦区")
      .replace("クァンジング", "広津区")
      .replace("チョンノグ", "鍾路区");''',
          )

          replace(
              "lib/discovery-ui.ts",
              '''    .replace("Seongdonggu", "Seongdong-gu")
    .replace("Mapogu", "Mapo-gu");''',
              '''    .replace("Seongdonggu", "Seongdong-gu")
    .replace("Mapogu", "Mapo-gu")
    .replace("Gwangjingu", "Gwangjin-gu")
    .replace("Jongrogu", "Jongno-gu")
    .replace("Jonglogu", "Jongno-gu");''',
          )

          replace(
              "components/TourApiImageBackfill.tsx",
              'REDTABLE에 사진이 없는 성수·홍대 가게만 음식메뉴 이미지 → 대표 이미지 → 일반 이미지 순으로 확인합니다.',
              'REDTABLE에 사진이 없는 성수·자양·홍대·종로 가게만 음식메뉴 이미지 → 대표 이미지 → 일반 이미지 순으로 확인합니다.',
          )

      - name: Commit region support
        run: |
          git config user.name "Flow4Work"
          git config user.email "flow4work@gmail.com"
          git add components/PublicDataCollector.tsx app/api/redtable/collect/route.ts lib/discovery.ts app/api/public-data/images/route.ts app/api/tourapi/images/route.ts lib/discovery-ui.ts components/TourApiImageBackfill.tsx
          git commit -m "Add Jongno restaurant collection region"
          git push origin main
