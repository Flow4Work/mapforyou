name: Bootstrap MapForYou source

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Rebuild source archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          download_blob() {
            local sha="$1"
            local output="$2"
            gh api "repos/${GITHUB_REPOSITORY}/git/blobs/${sha}" --jq '.content' \
              | tr -d '\n' \
              | base64 -d > "$output"
          }

          download_blob 33332a8b6f782f0d7acda05be5e5546fa5f84cba part-00
          download_blob 76ebf241cd7e774191f308b8f6a5a91d7b88e548 part-01
          download_blob c78ae5a09d5f5286bcc20c9a02aaebb702495f3d part-02
          download_blob 41eb71a4b8fdda2113b5732e2c50dab0e3c685b2 part-03
          download_blob d94852f2cfc589a81e7a69c934b813209495b1f7 part-04
          download_blob f2bbdda243dbba0cd41a45aeeee9dcc1d222c64b part-05

          cat part-00 part-01 part-02 part-03 part-04 part-05 > mapforyou-source.zip
          unzip -t mapforyou-source.zip
          unzip -o mapforyou-source.zip

          rm -f part-00 part-01 part-02 part-03 part-04 part-05 mapforyou-source.zip
          rm -f .github/workflows/bootstrap.yml

      - name: Commit application source
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build MapForYou MVP" || exit 0
          git push
